server:
  port: 8082

spring:
  application:
    name: product-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/productdb}
    username: ${DB_USERNAME:atlas}
    password: ${DB_PASSWORD:atlaspass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
